{% load veripoint_tags %}
<span class="badge badge-accent" title="{{ evidence.original_filename }}">
  <i data-lucide="{{ evidence.evidence_type|evidence_icon }}" class="w-3 h-3"></i>
  <span>{{ evidence.get_evidence_type_display }}</span>
  {% if evidence.is_verified %}
    <i data-lucide="check-circle" class="w-3 h-3 text-success"></i>
  {% endif %}
</span>
