{% if is_paginated %}
<div class="flex justify-center items-center gap-2 mt-8">
  {% if page_obj.has_previous %}
    <a href="?page={{ page_obj.previous_page_number }}{% if search_query %}&q={{ search_query }}{% endif %}{% if selected_category %}&category={{ selected_category }}{% endif %}" class="btn btn-secondary btn-sm">
      <i data-lucide="chevron-left"></i> Previous
    </a>
  {% else %}
    <button class="btn btn-secondary btn-sm" disabled><i data-lucide="chevron-left"></i> Previous</button>
  {% endif %}

  <span class="text-sm text-muted">
    Page <strong>{{ page_obj.number }}</strong> of {{ page_obj.paginator.num_pages }}
  </span>

  {% if page_obj.has_next %}
    <a href="?page={{ page_obj.next_page_number }}{% if search_query %}&q={{ search_query }}{% endif %}{% if selected_category %}&category={{ selected_category }}{% endif %}" class="btn btn-secondary btn-sm">
      Next <i data-lucide="chevron-right"></i>
    </a>
  {% else %}
    <button class="btn btn-secondary btn-sm" disabled>Next <i data-lucide="chevron-right"></i></button>
  {% endif %}
</div>
{% endif %}
