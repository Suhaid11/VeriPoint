<!DOCTYPE html>
<html>
<body style="font-family: Arial, sans-serif; line-height: 1.6; color: #333;">
  <div style="max-width: 600px; margin: 0 auto; padding: 20px; border: 1px solid #e2e8f0; border-radius: 8px;">
    <h2 style="color: #4f46e5;">VeriPoint — Password Reset</h2>
    <p>Hello <strong>{{ user.get_username }}</strong>,</p>
    <p>You requested a password reset for your VeriPoint account.</p>
    <p style="margin: 25px 0;">
      <a href="{{ protocol }}://{{ domain }}{% url 'accounts:password_reset_confirm' uidb64=uid token=token %}" 
         style="background-color: #4f46e5; color: #ffffff; padding: 12px 24px; text-decoration: none; border-radius: 6px; font-weight: bold; display: inline-block;">
        Reset Password
      </a>
    </p>
    <p style="font-size: 12px; color: #64748b;">If you did not request this, please ignore this email.</p>
  </div>
</body>
</html>
