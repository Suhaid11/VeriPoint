{% extends 'base.html' %}

{% block title %}Server Error — VeriPoint{% endblock %}

{% block content %}
<div class="container container-sm text-center py-16">
  <div class="inline-flex p-6 rounded-full bg-danger-bg text-danger mb-6">
    <i data-lucide="server-off" style="width: 48px; height: 48px;"></i>
  </div>
  <h1 class="text-4xl font-extrabold mb-4">500 — Internal Server Error</h1>
  <p class="text-muted text-lg mb-8 max-w-md mx-auto">
    Something unexpected happened on our end. Our engineering team has been notified.
  </p>
  <a href="{% url 'core:landing' %}" class="btn btn-primary btn-lg">Return Home</a>
</div>
{% endblock %}
