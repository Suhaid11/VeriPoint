{% extends 'base.html' %}

{% block title %}Reset Password — VeriPoint{% endblock %}

{% block content %}
<div class="container container-sm py-12">
  <div class="card p-8 max-w-md mx-auto shadow-lg">
    <h2 class="text-2xl font-bold mb-2">Reset Password</h2>
    <p class="text-sm text-muted mb-6">Enter your registered email address and we will send you instructions to reset your password.</p>

    <form method="POST" action="">
      {% csrf_token %}
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input type="email" name="email" class="form-control" placeholder="you@example.com" required>
      </div>

      <button type="submit" class="btn btn-primary btn-lg w-full mt-2">Send Reset Link</button>
    </form>

    <div class="text-center mt-6 text-sm">
      <a href="{% url 'accounts:login' %}" class="text-primary font-semibold">&larr; Back to Login</a>
    </div>
  </div>
</div>
{% endblock %}
