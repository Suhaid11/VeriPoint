{% extends 'base.html' %}

{% block title %}Reset Link Sent — VeriPoint{% endblock %}

{% block content %}
<div class="container container-sm py-12 text-center">
  <div class="card p-8 max-w-md mx-auto shadow-lg">
    <div class="inline-flex p-4 rounded-full bg-accent-subtle text-accent-dark mb-4">
      <i data-lucide="mail-check" class="w-8 h-8"></i>
    </div>
    <h2 class="text-2xl font-bold mb-2">Check Your Email</h2>
    <p class="text-sm text-muted mb-6">
      If an account exists with the email you entered, we've sent instructions to reset your password. (Check your terminal console in development).
    </p>
    <a href="{% url 'accounts:login' %}" class="btn btn-primary btn-lg w-full">Return to Login</a>
  </div>
</div>
{% endblock %}
