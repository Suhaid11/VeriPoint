{% extends 'base.html' %}

{% block title %}Password Reset Complete — VeriPoint{% endblock %}

{% block content %}
<div class="container container-sm py-12 text-center">
  <div class="card p-8 max-w-md mx-auto shadow-lg">
    <div class="inline-flex p-4 rounded-full bg-success-bg text-success mb-4">
      <i data-lucide="check-circle" class="w-8 h-8"></i>
    </div>
    <h2 class="text-2xl font-bold mb-2">Password Changed!</h2>
    <p class="text-sm text-muted mb-6">Your password has been reset successfully. You can now log in with your new password.</p>
    <a href="{% url 'accounts:login' %}" class="btn btn-primary btn-lg w-full">Log In Now</a>
  </div>
</div>
{% endblock %}
