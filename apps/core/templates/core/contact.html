{% extends 'base.html' %}

{% block title %}Contact Us — VeriPoint{% endblock %}

{% block content %}
<div class="container container-sm py-12">
  <div class="card p-8">
    <h1 class="text-3xl font-extrabold mb-2">Get in Touch</h1>
    <p class="text-muted text-sm mb-6">Have questions or feedback about VeriPoint? Send us a message.</p>

    <form method="POST" action="">
      {% csrf_token %}
      <div class="form-group">
        <label class="form-label">Your Name</label>
        <input type="text" name="name" class="form-control" placeholder="John Doe" required>
      </div>

      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input type="email" name="email" class="form-control" placeholder="you@example.com" required>
      </div>

      <div class="form-group">
        <label class="form-label">Subject</label>
        <input type="text" name="subject" class="form-control" placeholder="Inquiry subject" required>
      </div>

      <div class="form-group">
        <label class="form-label">Message</label>
        <textarea name="message" rows="5" class="form-control" placeholder="How can we help you?" required></textarea>
      </div>

      <button type="submit" class="btn btn-primary btn-lg w-full">Send Message</button>
    </form>
  </div>
</div>
{% endblock %}
